name: Release Windows EXE

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: "23"

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y
          $wixBin = (Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" |
                      Sort-Object Name |
                      Select-Object -Last 1).FullName + "\bin"
          Write-Host "WiX bin path: $wixBin"
          Add-Content $env:GITHUB_PATH $wixBin

      - name: Build
        run: mvn -q -DskipTests package

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $RefType = "${{ github.ref_type }}"
          if ($RefType -eq "tag") {
            $Version = "${{ github.ref_name }}".TrimStart('v')
          } else {
            $pom = Get-Content "pom.xml" -Raw
            $m = [regex]::Match($pom, "<version>([^<]+)</version>")
            $Version = $m.Groups[1].Value
            $Version = $Version -replace "-SNAPSHOT", ""
          }
          if ([string]::IsNullOrWhiteSpace($Version)) { $Version = "1.0.0" }
          $parts = $Version.Split('.')
          if ($parts.Length -eq 1) { $Version = "$Version.0.0" }
          elseif ($parts.Length -eq 2) { $Version = "$Version.0" }
          echo "version=$Version" >> $env:GITHUB_OUTPUT

      - name: Diagnose WiX
        shell: pwsh
        run: |
          Write-Host "=== PATH ==="
          $env:PATH -split ";" | Where-Object { $_ -match -i "wix" }
          Write-Host "=== light.exe location ==="
          Get-Command light.exe -ErrorAction SilentlyContinue
          Write-Host "=== WiX dirs ==="
          Get-ChildItem "C:\Program Files (x86)\" | Where-Object { $_.Name -match "WiX" }

      - name: Build EXE with jpackage
        shell: pwsh
        run: |
          $Version = "${{ steps.ver.outputs.version }}"
          $AppName = "OblikCars"
          $InputDir = "target"
          $MainJar = (Get-ChildItem -Path $InputDir -Filter "*.jar" |
             Where-Object { $_.Name -notmatch "original|sources|javadoc" } |
             Sort-Object Length -Descending |
             Select-Object -First 1).Name
          Write-Host "Using jar: $MainJar"
          jpackage `
            --type exe `
            --name $AppName `
            --input $InputDir `
            --main-jar $MainJar `
            --main-class com.work.oblikcars.Main `
            --app-version $Version `
            --icon src\main\resources\icon.ico `
            --dest dist `
            --verbose 2>&1

      - name: Create/Update GitHub Release (tagged)
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe

      - name: Create/Update GitHub Release (latest)
        if: ${{ github.ref_type != 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: dist/*.exe
