name: Release Windows EXE

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: "23"

      - name: Install WiX 3 (short path)
        shell: pwsh
        run: |
          # Завантажуємо бінарники напряму — без choco, без довгих шляхів інсталятора
          Invoke-WebRequest `
            -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" `
            -OutFile "C:\wix314.zip"
          Expand-Archive -Path "C:\wix314.zip" -DestinationPath "C:\wix" -Force
          echo "C:\wix" >> $env:GITHUB_PATH
          Write-Host "light.exe: $(Test-Path 'C:\wix\light.exe')"

      - name: Build
        run: mvn -q -DskipTests package

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $RefType = "${{ github.ref_type }}"
          if ($RefType -eq "tag") {
            $Version = "${{ github.ref_name }}".TrimStart('v')
          } else {
            $pom = Get-Content "pom.xml" -Raw
            $m = [regex]::Match($pom, "<version>([^<]+)</version>")
            $Version = $m.Groups[1].Value
            $Version = $Version -replace "-SNAPSHOT", ""
          }
          if ([string]::IsNullOrWhiteSpace($Version)) { $Version = "1.0.0" }
          $parts = $Version.Split('.')
          if ($parts.Length -eq 1) { $Version = "$Version.0.0" }
          elseif ($parts.Length -eq 2) { $Version = "$Version.0" }
          echo "version=$Version" >> $env:GITHUB_OUTPUT

      - name: Build EXE with jpackage
        shell: pwsh
        run: |
          # Короткий temp щоб WiX не падав на довгих шляхах
          $env:PATH = "C:\wix;$env:PATH"
          $env:TEMP = "C:\tmp"
          $env:TMP  = "C:\tmp"
          New-Item -ItemType Directory -Force -Path "C:\tmp" | Out-Null

          $Version = "${{ steps.ver.outputs.version }}"
          $MainJar = (Get-ChildItem -Path target -Filter "*.jar" |
             Where-Object { $_.Name -notmatch "original|sources|javadoc" } |
             Sort-Object Length -Descending |
             Select-Object -First 1).Name
          Write-Host "Using jar: $MainJar"
          Write-Host "light.exe found: $(Test-Path 'C:\wix\light.exe')"

          jpackage `
            --type exe `
            --name OblikCars `
            --input target `
            --main-jar $MainJar `
            --main-class com.work.oblikcars.Main `
            --app-version $Version `
            --icon src\main\resources\icon.ico `
            --dest dist

      - name: Create/Update GitHub Release (tagged)
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe

      - name: Create/Update GitHub Release (latest)
        if: ${{ github.ref_type != 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: dist/*.exe